<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generando reporte</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f5f5f5;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    .spinner {
      margin-top: 20px;
      width: 30px;
      height: 30px;
      border: 4px solid #ddd;
      border-top: 4px solid #333;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: auto;
      margin-right: auto;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Generando reporte...</h2>
    <p>Por favor espere mientras se procesa la información.</p>
    <div class="spinner"></div>
  </div>

  <script>
    const reporteUrl = "reporte.html";

    async function verificarReporte() {
      try {
        const response = await fetch(reporteUrl, { method: "HEAD", cache: "no-store" });

        if (response.ok) {
          // Si existe, redirige
          window.location.href = reporteUrl;
        }
      } catch (error) {
        console.log("Reporte aún no disponible...");
      }
    }

    // Revisar cada 2 segundos
    setInterval(verificarReporte, 2000);
  </script>

</body>
</html>
